name: primeview
description: "Netflix-style IPTV media streaming app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  get_it: ^8.0.3
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_hooks: ^0.20.5
  shimmer: ^3.0.0
  equatable: ^2.0.7
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  wakelock_plus: ^1.2.10
  google_fonts: ^6.2.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  html_unescape: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
